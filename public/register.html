<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟光学实验室 - 用户注册</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        /* 背景渐变 + 全屏布局 */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        /* 注册卡片容器 */
        .register-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(8px);
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
        }

        /* 卡片顶部装饰条 */
        .register-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        /* 标题样式 */
        .register-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-title h2 {
            color: #2d3748;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .register-title p {
            color: #718096;
            font-size: 14px;
        }

        /* 表单样式 */
        .register-form {
            margin-bottom: 20px;
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 6px;
            padding-left: 2px;
        }
        .input-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #ffffff;
        }
        .input-group input:hover {
            border-color: #cbd5e0;
        }

        /* 注册按钮 */
        .register-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .register-btn:active {
            transform: translateY(0);
        }

        /* 登录提示 */
        .login-tip {
            text-align: center;
            font-size: 14px;
            color: #718096;
        }
        .login-tip a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        .login-tip a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* 底部版权信息 */
        .copyright {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- 标题区域 -->
        <div class="register-title">
            <h2>账号注册</h2>
            <p>创建您的虚拟光学实验室账号</p>
        </div>

        <!-- 注册表单 -->
        <form action="/register" method="POST" class="register-form">
            <div class="input-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请设置用户名" required>
            </div>
            <div class="input-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请设置密码" required>
            </div>
            <button type="submit" class="register-btn">注册账号</button>
        </form>

        <!-- 登录提示 -->
        <div class="login-tip">
            已有账号？<a href="/login.html">立即登录</a>
        </div>

        <!-- 底部版权 -->
        <div class="copyright">
            © 2026 虚拟光学实验室 - 毕业设计专用
        </div>
    </div>
</body>
</html>
